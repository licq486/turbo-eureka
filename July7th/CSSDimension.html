<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS尺寸</title>

    <style>
        html {
            height: 100%;
            width: 100%;
        }

        body {
            height: 100%;
            width: 100%;
        }

        hr {
            color: blue;
            border: 2px solid blue;
            size: 1px;
        }

        /*visibility隐藏元素*/
        p.hidden {
            visibility: hidden;
        }

        /*display隐藏元素*/
        p.none {
            display: none;
        }

        p.ex1 {
            width: 200px;
            height: 100px;
            /*设置段落的最大宽度和高度*/
            max-width: 300px;
            max-height: 200px;
        }

        img.ex1 {
            height: auto;
            width: auto;
        }

        img.ex2 {
            height: 100px;
            width: 200px;
        }

        img.normal {
            height: auto;
            width: auto;
        }

        img.big {
            height: 50%;
            width: 60%;
        }

        img.small {
            height: 10%;
            width: 20%;
        }
    </style>
</head>

<body>

    <p class="ex1">这个段落的宽是200px,高是100px</p><br>
    <hr>

    <h2>这是一个可见标题</h2>
    <p class="hidden">这个段落是隐藏的</p>
    <p>使用visibility属性隐藏元素不可见但仍占用未隐藏之前的空间</p>
    <br>
    <hr>

    <h2>这是一个可见标题</h2>
    <p class="none">这个段落是隐藏的</p>
    <p>使用display属性隐藏元素不可见且不占用空间</p>
    <br>
    <hr>

    <p>使用像素设置图像的高度和宽度</p>
    <img class="ex1" src="flowers.jpg" alt="flowers" width="300px" height="300px">
    <img class="ex2" src="flowers.jpg" alt="flowers" width="300px" height="300px">
    <br>
    <hr>

    <p>使用百分比设置图像的高度和宽度</p><br>
    <img class="normal" src="butterfly.jpg" alt="butterfly" width="300px" height="300px">
    <img class="big" alt="butterfly" src="butterfly.jpg" width="300px" height="300px">
    <img class="small" alt="butterfly" src="butterfly.jpg" width="300px" height="300px">


</body>

</html>
