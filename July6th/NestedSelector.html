<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>嵌套选择器</title>
    <style>
        /*为所有p元素指定一个样式*/
        p {
            text-align: center;
            color: blue;
            text-align: center;
        }

        /*为所有 class="marked" 的元素指定一个样式 */
        .marked {
            text-align: center;
            background-color: rgb(203, 221, 178);
            height: 100%;
            width: 100%;
        }

        /*为 class="marked" 元素内的所有p元素指定一个样式 */
        .marked p {
            text-align: center;
            color: white;
        }

        /*为 class="marked" 的p元素指定一个样式 */
        p.marked {
            text-align: center;
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <p>这个段落是蓝色文本，居中对齐。</p>

    <div class="marked">
        <p>这个段落不是蓝色文本。</p>
    </div>

    <p>所有 class="marked"元素内的 p 元素指定一个样式，但有不同的文本颜色。</p>

    <p class="marked">带下划线的 p 段落。</p>

</body>

</html>
