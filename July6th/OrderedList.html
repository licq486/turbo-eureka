<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>不同类型的有序列表</title>
</head>

<body>
    <h3>编号列表：</h3>
    <ol>
        <li>Apples</li>
        <li>banana</li>
        <li>lemons</li>
        <li>orange</li>
    </ol>

    <h3>大写字母列表：</h3>
    <ol type="A">
        <li>Apples</li>
        <li>Lemons</li>
        <li>Banana</li>
        <li>Oranges</li>
    </ol>

    <h3>小写字母列表：</h3>
    <ol type="a">
        <li>apples</li>
        <li>banana</li>
        <li>Oranges</li>
        <li>lemons</li>
    </ol>

    <h3>罗马字母列表：</h3>
    <ol type="I">
        <li>apples</li>
        <li>banana</li>
        <li>Oranges</li>
        <li>lemons</li>
    </ol>


</body>

</html>
