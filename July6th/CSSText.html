<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>css text-align实例</title>

    <style>
        /* 设置h1元素的文本居中对齐 */
        h1 {
            text-align: center;
        }

        /* 设置p元素的文本右对齐 */
        p.data {
            text-align: right;
        }

        /* 设置p元素的文本两端对齐 */
        p.main {
            text-align: justify;
        }
    </style>

</head>

<body>
    <h1>CSS文本实例</h1>
    <!-- 设置p元素的文本右对齐 -->
    <p class="data">2026年7月6日</p>
    <!-- 设置p元素的文本两端对齐 -->
    <p class="main">
        “当我年轻的时候，我梦想改变这个世界；当我成熟以后，我发现我不能够改变这个世界，我将目光缩短了些，决定只改变我的国家；当我进入暮年以后，我发现我不能够改变我们的国家，我的最后愿望仅仅是改变一下我的家庭，但是，这也不可能。当我现在躺在床上，行将就木时，我突然意识到：如果一开始我仅仅去改变我自己，然后，我可能改变我的家庭；在家人的帮助和鼓励下，我可能为国家做一些事情；然后，谁知道呢?我甚至可能改变这个世界。”
    </p>

    <!--字符转换-->
    <p><b>注意：</b> &quot;justify;&quot; 是如何工作的</p>

</body>

</html>
