<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>格式化文本</title>
</head>

<body>
    <b>这个文本是加粗的</b>

    <br>

    <strong>这是文本是加粗的</strong>

    <br>

    <em>html学到哪里了</em>

    <br>

    <i>学习css</i>

    <br>

    <small>缩小字体</small>

    <br>

    x<sub>2</sub>

    <br>

    y<sup>3</sup>
</body>

</html>
