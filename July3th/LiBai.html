    <h2>
      静夜思
    </h2>
    <a
      href="https://www.baidu.com/s?ie=utf-8&f=8&rsv_bp=1&rsv_idx=1&tn=baidu&wd=%E6%9D%8E%E7%99%BD&fenlei=256&rsv_pq=0xef8be33800c54d47&rsv_t=d541pFfrvwuF%2FlqV%2FFsPRiRrrjrwWN6ZuHJb7pcibbPC%2FvlA%2BbFxqvMq%2B1iA&rqlang=en&rsv_enter=1&rsv_dl=tb_enter&rsv_sug3=17&rsv_sug1=38&rsv_sug7=100&rsv_btype=i&prefixsug=%25E6%259D%258E%25E7%2599%25BD&rsp=6&inputT=16595&rsv_sug4=16595">李白</a>
    <p>床前明月光，</p>
    <p>疑是地上霜。</p>
    <p>举头望明月，</p>
    <p>低头思故乡。</p>

    <p>
      《静夜思》是唐代诗人李白所作的一首五言古诗。
      此诗描写了秋日夜晚，诗人于屋内抬头望月的所感。
      诗中运用比喻、衬托等手法，表达客居思乡之情，
      语言清新朴素而韵味含蓄无穷，历来广为传诵。
    </p>
