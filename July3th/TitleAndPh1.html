<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标题和段落</title>
</head>
<body>
  <h1>这是一级标题，只能使用一次</h1>
  <h2>这是二级标题</h2>
  <h3>这是三级标题</h3>
  <h4>这是四级标题</h4>
  <h5>这是五级标题</h5>
  <h6>这是六级标题 每页标题不要使用超过三个</h6>
  <p>段落</p>
  <p>语义化的好处：更清晰的代码结构，对搜索引擎更友好，更好的可访问性</p>
</body>
</html>
