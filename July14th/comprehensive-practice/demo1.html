<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数组奇偶分类统计</title>
</head>

<body>
    <h1>数组奇偶分类统计</h1>
    <p id="demo"></p>

    <script>
        /*需求：
1.	定义数组 let arr = [12, 5, 8, 19, 22, 7, 30, 1];
2.	for 循环遍历数组，if 判断奇偶
3.	分别统计偶数总数、奇数总数，打印两个数字
4.	输出所有偶数、所有奇数分别拼接成字符串展示*/
        let arr = [12, 5, 8, 19, 22, 30, 1];
        let evenArr = [];
        let oddArr = [];
        let evenCount = 0;
        let oddCount = 0;

        for (let i = 0; i < arr.length; i++) {
            let num = arr[i];

            if (num % 2 === 0) {
                evenArr.push(num);
                evenCount++;
            }
            else {
                oddArr.push(num);
                oddCount++;
            }
        }

        let result = `所有偶数:${evenArr}<br>
        偶数个数:${evenCount}<br>
        所有奇数:${oddArr}<br>
        奇数个数:${oddCount}`;

        document.getElementById("demo").innerHTML = result;


    </script>

</body>

</html>
